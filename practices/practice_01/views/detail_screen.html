<html>
<imart type="head">
  <title>Detail Screen</title>
  <imart type="imuiLink" href="ui/css/imui.css" />
  <imart type="imuiScript" src="ui/libs/bigdecimal-js/BigDecimal-all-last.js" />
  <imart type="imuiScript" src="ui/js/math/im_decimal.js" />
  <imart type="imuiScript" src="im_i18n/number/format/im_decimal_formatter.js" />
  <imart type="clientDecimalFormatScript" />
  <imart type="imuiSessionKeeper" autoKeep="true" />

  <!-- script for validation -->
  <imart type="imuiScript" src="ui/libs/jquery-validation-1.9.0/jquery.validate.js" />
  <imart type="imuiValidationRule" rule="training/dzu/practices/practice_01/validate/detail_screen_validate#rules"
    rulesName="rules" messagesName="msg" />

  <style>
    .avatar-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 10px;
    }

    .avatar-preview {
      width: 160px;
      height: 160px;
      border: 1px solid #ccc;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      overflow: hidden;
    }

    .avatar-preview img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    .avatar-preview span {
      color: #999;
      font-size: 13px;
    }

    .upload-btn {
      width: 100px;
    }
  </style>

  <script>
    $(function () {
      $('#saveBtn').click(function (e) {
        if (imuiValidate('#detailPeople', rules, msg)) {
          let dialogType = $('[name="dialogType"]').val();
          let data = $('#list').getGridParam('data');
          let req = {};
          req.fullName = $('[name="fullName"]').val();
          req.email = $('[name="email"]').val();
          req.phone = $('[name="phone"]').val();
          req.status = $('[name="status"]').val();
          req.birthDate = $('[name="birthDate"]').val();
          req.peopleCode = $('[name="peopleCode"]').val();
          req.avatarFileId = $('[name="avatarTempPath"]').val();
          if (dialogType == 'add') {
            data.push(req)
            Practice01PeopleZZZ.insertPeople(req);
          } else {
            data = data.map(function (item) {
              if (item.peopleCode == req.peopleCode) {
                return req;
              }
              return item;
            })
            Practice01PeopleZZZ.updatePeople(req);
          }
          $('#list').setGridParam({ data: data }).trigger('reloadGrid');
          $('#detailDialog').imuiDialog('close');
        }
      });

      $('#downloadAvatarBtn').click(function () {
        let imagePath = $('[name="avatarPicture"]').attr('src');
        console.log(imagePath);
        if (imagePath) {
          window.location.href = document.baseURI + imagePath;
        }
      });
    });


    function onStatusChange() {
      $('[name="status"]').val(this.value);
    }

    function onUploadSuccess(e, data) {
      let imagePath = data.result[0].publicPath;
      $('[name="avatarTempPath"]').val(imagePath);
      loadImage(imagePath);
    }
  </script>
</imart>

<div class="imui-form">
  <table class="imui-table">
    <tbody>
      <tr>
        <th><label>People Info</label></th>
        <th><label>Avatar</label></th>
      </tr>
      <tr>
        <td style="width: 50%;">
          <form id="detailPeople">
            <table class="imui-table-inner">
              <tbody>
                <tr>
                  <th class="wd-150px"><label class="imui-required">Full Name</label></th>
                  <td>
                    <imart type="imuiTextbox" name="fullName" />
                  </td>
                </tr>
                <tr>
                  <th><label>Email</label></th>
                  <td>
                    <imart type="imuiTextbox" name="email" />
                  </td>
                </tr>
                <tr>
                  <th><label>Phone</label></th>
                  <td>
                    <imart type="imuiTextbox" id="phone" />
                  </td>
                </tr>
                <tr>
                  <th><label class="imui-required">Status</label></th>
                  <td>
                    <imart type="imuiSelect" name="status" list=$bind.statusList onChange="onStatusChange" />
                  </td>
                </tr>
                <tr>
                  <th><label>Birth date</label></th>
                  <td>
                    <imart type="imuiTextbox" name="birthDate" id="birthDate" />
                    <imart type="imuiCalendar" floatable="true" altField="#birthDate" showButtonPanel="false" />
                    <a id="clearBirthDate" class="imui-icon-picker-palette-clear">
                      <imart type="imuiShowIcon" iconId="im-ui-icon-common-16-clear_16" />
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
          </form>

        </td>
        <td style="width: 50%;">
          <table class="imui-table-inner">
            <tbody>
              <tr>
                <th><label>Avatar</label></th>
                <td>
                  <div class="avatar-container">
                    <div class="avatar-preview">
                      <span id="avatarPic">
                        <imart type="picture" id="avatarPicture" name="avatarPicture"
                          src="training/zzz/avatar_zzz.jpg" />
                        <imart type="hidden" avatarTempPath="" />
                      </span>
                    </div>
                    <imart type="imuiFileUpload" id="avatarUpload" inputName="avatarUpload" autoUpload="true"
                      acceptFileTypes="/(\.|\/)(png|jpe?g)$/i" url="view/dzu/practices/practice_01/control/avatarUpload"
                      onSuccess="onUploadSuccess" />
                    <imart type="imuiButton" id="downloadAvatarBtn" iconClass="im-ui-icon-common-16-file-download"
                      label="Download" class="imui-medium-button" />
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="imui-operation-parts">
    <imart type="imuiButton" id="saveBtn" value="Save" class="imui-large-button"
      style="background-color: #d4edda; border-color: #28a745; color: #155724;" />
    <imart type="imuiButton" id="cancelBtn" value="Cancel" class="imui-large-button"
      onclick="$('#detailDialog').imuiDialog('close');" />
  </div>

  <imart type="hidden" dialogType="" peopleId="" peopleCode=""></imart>
</div>



</html>
